<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Rules - Smart Traffic System</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <div style="display: flex; min-height: 100vh;">
        <!-- Sidebar -->
        <aside
            style="width: 250px; background: var(--glass-bg); backdrop-filter: blur(12px); border-right: var(--glass-border); padding: 2rem 1rem;">
            <div class="logo" style="margin-bottom: 3rem; text-align: center;">
                <i class="fas fa-shield-alt"></i> Admin Panel
            </div>
            <ul style="display: flex; flex-direction: column; gap: 1rem;">
                <li><a href="dashboard.html" class="btn btn-outline"
                        style="width: 100%; border: none; justify-content: flex-start;"><i class="fas fa-chart-line"
                            style="margin-right: 10px;"></i> Dashboard</a></li>
                <li><a href="rules.html" class="btn btn-outline"
                        style="width: 100%; border: none; justify-content: flex-start; background: rgba(99,102,241,0.1); color: var(--primary-color);"><i
                            class="fas fa-gavel" style="margin-right: 10px;"></i> Traffic Rules</a></li>
                <li><a href="#" onclick="logout()" class="btn btn-outline"
                        style="width: 100%; border: none; justify-content: flex-start; color: var(--error-color);"><i
                            class="fas fa-sign-out-alt" style="margin-right: 10px;"></i> Logout</a></li>
            </ul>
        </aside>

        <!-- Main Content -->
        <main style="flex: 1; padding: 2rem;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <h1 class="fade-in">Traffic Rules</h1>
                <button id="addRuleBtn" class="btn"><i class="fas fa-plus"></i> Add Rule</button>
            </div>

            <div class="card fade-in">
                <table style="width: 100%; border-collapse: collapse; text-align: left;">
                    <thead>
                        <tr style="border-bottom: 1px solid var(--border-color);">
                            <th style="padding: 1rem;">Rule Name</th>
                            <th style="padding: 1rem;">Description</th>
                            <th style="padding: 1rem;">Fine Amount</th>
                            <th style="padding: 1rem;">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="rulesTableBody">
                        <!-- Rules -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Add Rule Modal -->
    <div id="ruleModal"
        style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center;">
        <div class="card" style="width: 100%; max-width: 500px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                <h2>Add New Rule</h2>
                <button id="closeRuleModal"
                    style="background: none; border: none; color: white; cursor: pointer; font-size: 1.5rem;">&times;</button>
            </div>
            <form id="ruleForm">
                <div class="form-group">
                    <label class="form-label">Rule Name</label>
                    <input type="text" id="ruleName" class="form-control" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Description</label>
                    <textarea id="ruleDesc" class="form-control" rows="3" required></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label">Fine Amount (₹)</label>
                    <input type="number" id="ruleFine" class="form-control" required>
                </div>
                <button type="submit" class="btn" style="width: 100%;">Save Rule</button>
            </form>
        </div>
    </div>

    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/rules.js"></script>
    <script>
        function logout() {
            localStorage.clear();
            window.location.href = '../index.html';
        }
    </script>
</body>

</html>
