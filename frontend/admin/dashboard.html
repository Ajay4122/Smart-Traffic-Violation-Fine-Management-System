<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Smart Traffic System</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <div style="display: flex; min-height: 100vh;">
        <!-- Sidebar -->
        <aside
            style="width: 250px; background: var(--glass-bg); backdrop-filter: blur(12px); border-right: var(--glass-border); padding: 2rem 1rem;">
            <div class="logo" style="margin-bottom: 3rem; text-align: center;">
                <i class="fas fa-shield-alt"></i> Admin Panel
            </div>
            <ul style="display: flex; flex-direction: column; gap: 1rem;">
                <li><a href="dashboard.html" class="btn btn-outline"
                        style="width: 100%; border: none; justify-content: flex-start; background: rgba(99,102,241,0.1); color: var(--primary-color);"><i
                            class="fas fa-chart-line" style="margin-right: 10px;"></i> Dashboard</a></li>
                <li><a href="rules.html" class="btn btn-outline"
                        style="width: 100%; border: none; justify-content: flex-start;"><i class="fas fa-gavel"
                            style="margin-right: 10px;"></i> Traffic Rules</a></li>
                <li><a href="#" onclick="logout()" class="btn btn-outline"
                        style="width: 100%; border: none; justify-content: flex-start; color: var(--error-color);"><i
                            class="fas fa-sign-out-alt" style="margin-right: 10px;"></i> Logout</a></li>
            </ul>
        </aside>

        <!-- Main Content -->
        <main style="flex: 1; padding: 2rem; overflow-y: auto;">
            <h1 class="fade-in">Dashboard Overview</h1>

            <div class="grid grid-cols-3 fade-in" style="margin-top: 2rem;">
                <div class="card">
                    <h3>Total Violations</h3>
                    <p id="totalViolations" style="font-size: 2.5rem; font-weight: 700; color: var(--primary-color);">0
                    </p>
                </div>
                <div class="card">
                    <h3>Pending Payment</h3>
                    <p id="pendingViolations" style="font-size: 2.5rem; font-weight: 700; color: var(--warning-color);">
                        0</p>
                </div>
                <div class="card">
                    <h3>Total Revenue</h3>
                    <p id="totalRevenue" style="font-size: 2.5rem; font-weight: 700; color: var(--success-color);">₹0
                    </p>
                </div>
            </div>

            <div class="grid grid-cols-2 fade-in" style="margin-top: 2rem;">
                <div class="card">
                    <h3>Violations Overview</h3>
                    <canvas id="violationsChart"></canvas>
                </div>
                <div class="card">
                    <h3>Revenue Trend</h3>
                    <canvas id="revenueChart"></canvas>
                </div>
            </div>
        </main>
    </div>

    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/admin.js"></script>
    <script>
        function logout() {
            localStorage.clear();
            window.location.href = '../index.html';
        }
    </script>
</body>

</html>
